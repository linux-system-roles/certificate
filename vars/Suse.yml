---
# SUSE os_family specific values.

__certificate_default_directory: /etc/ssl

__certificate_packages:
  - python3-cryptography
  - python3-dbus-python
  - python3-pyasn1

__certificate_trust_dir: /etc/pki/trust/anchors
__certificate_update_trust_cli: /usr/sbin/update-ca-certificates
