# SPDX-License-Identifier: MIT
---
- name: Trust a certificate provided as a file on the managed host
  hosts: all
  vars:
    __trust_test_ca_cert: /tmp/lsr_trust_test_ca.crt
    __trust_test_ca_key: /tmp/lsr_trust_test_ca.key
    certificate_trust:
      - name: lsr-trust-test-src
        src: "{{ __trust_test_ca_cert }}"
        remote_src: true
  tasks:
    - name: Ensure openssl is installed
      package:
        name: openssl
        state: present

    - name: Generate a self-signed test CA certificate
      command: >-
        openssl req -x509 -new -newkey rsa:2048 -nodes -days 3650
        -subj /CN=LSR-Trust-Test-CA
        -keyout {{ __trust_test_ca_key }}
        -out {{ __trust_test_ca_cert }}
      changed_when: true

    - name: Check that the test CA certificate is not yet trusted
      command: openssl verify {{ __trust_test_ca_cert }}
      register: __trust_verify_before
      changed_when: false
      failed_when: false

    - name: Assert that the test CA certificate is not yet trusted
      assert:
        that: "__trust_verify_before.stdout is not search(': OK')"

    - name: Run the role
      include_tasks: tasks/run_role_with_clear_facts.yml

    - name: Load certificate role platform variables
      include_role:
        name: linux-system-roles.certificate
        tasks_from: set_vars.yml
        public: true

    - name: Get the trust anchor file attributes
      stat:
        path: "{{ __certificate_trust_dir }}/lsr-trust-test-src.crt"
      register: __trust_anchor

    - name: Assert that the trust anchor was installed
      assert:
        that:
          - __trust_anchor.stat.exists
          - __trust_anchor.stat.mode == '0644'
          - __trust_anchor.stat.pw_name == 'root'
          - __trust_anchor.stat.gr_name == 'root'

    - name: Check that the test CA certificate is now trusted
      command: openssl verify {{ __trust_test_ca_cert }}
      register: __trust_verify_after
      changed_when: false

    - name: Assert that the test CA certificate is now trusted
      assert:
        that: "__trust_verify_after.stdout is search(': OK')"

- name: Trust a certificate provided as inline content
  hosts: all
  vars:
    __trust_test_ca_cert: /tmp/lsr_trust_test_ca.crt
  tasks:
    - name: Slurp the test CA certificate
      slurp:
        path: "{{ __trust_test_ca_cert }}"
      register: __trust_test_ca_slurp

    # Cannot use tasks/run_role_with_clear_facts.yml here - clear_facts
    # would remove the registered __trust_test_ca_slurp variable before
    # the role evaluates certificate_trust
    - name: Run the role with inline certificate content
      include_role:
        name: linux-system-roles.certificate
      vars:
        certificate_trust:
          - name: lsr-trust-test-content
            content: "{{ __trust_test_ca_slurp.content | b64decode }}"

    - name: Load certificate role platform variables
      include_role:
        name: linux-system-roles.certificate
        tasks_from: set_vars.yml
        public: true

    - name: Get the trust anchor file attributes
      stat:
        path: "{{ __certificate_trust_dir }}/lsr-trust-test-content.crt"
      register: __trust_anchor_content

    - name: Assert that the trust anchor was installed
      assert:
        that:
          - __trust_anchor_content.stat.exists
          - __trust_anchor_content.stat.mode == '0644'

- name: Remove the trust anchors
  hosts: all
  vars:
    __trust_test_ca_cert: /tmp/lsr_trust_test_ca.crt
    __trust_test_ca_key: /tmp/lsr_trust_test_ca.key
    certificate_trust:
      - name: lsr-trust-test-src
        state: absent
      - name: lsr-trust-test-content
        state: absent
  tasks:
    - name: Run the role
      include_tasks: tasks/run_role_with_clear_facts.yml

    - name: Load certificate role platform variables
      include_role:
        name: linux-system-roles.certificate
        tasks_from: set_vars.yml
        public: true

    - name: Get the trust anchor file attributes
      stat:
        path: "{{ __certificate_trust_dir }}/{{ item }}.crt"
      loop:
        - lsr-trust-test-src
        - lsr-trust-test-content
      register: __trust_anchors_removed

    - name: Assert that the trust anchors were removed
      assert:
        that: not item.stat.exists
      loop: "{{ __trust_anchors_removed.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check that the test CA certificate is no longer trusted
      command: openssl verify {{ __trust_test_ca_cert }}
      register: __trust_verify_removed
      changed_when: false
      failed_when: false

    - name: Assert that the test CA certificate is no longer trusted
      assert:
        that: "__trust_verify_removed.stdout is not search(': OK')"

    - name: Clean up the test CA certificate and key
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ __trust_test_ca_cert }}"
        - "{{ __trust_test_ca_key }}"
