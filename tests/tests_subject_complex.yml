---
- name: Issue simple self-signed certificate
  hosts: all
  become: true
  vars:
    certificate_requests:
      - name: mycert_subject_complex
        dns: www.example.com
        common_name: '# \\Every"thing+that,ne;eds<escap>ing\0 '
        contact_email: admin@example.com
        ca: self-sign
  tasks:
    - name: Run the role
      include_tasks: tasks/run_role_with_clear_facts.yml

- name: Verify certificate
  hosts: all
  pre_tasks:
    - name: Load certificate role platform variables
      include_role:
        name: linux-system-roles.certificate
        tasks_from: set_vars.yml
        public: true
  become: true
  vars:
    certificates:
      - path: "{{ __certificate_default_directory }}/certs/mycert_subject_complex.crt"
        key_path: "{{ __certificate_default_directory }}/private/mycert_subject_complex.key"
        subject:
          - name: emailAddress
            oid: 1.2.840.113549.1.9.1
            value: admin@example.com
          - name: commonName
            oid: 2.5.4.3
            value: '# \\Every"thing+that,ne;eds<escap>ing\0 '
        subject_alt_name:
          - name: DNS
            value: www.example.com
  tasks:
    - name: Verify certs if not CentOS/RedHat 7
      when: |
        not (
            ansible_facts["distribution"] in ['CentOS', 'RedHat'] and
            ansible_facts["distribution_major_version"] == "7"
        )
      block:
        - name: Verify each certificate
          include_tasks: tasks/assert_certificate_parameters.yml
          loop: "{{ certificates }}"
          loop_control:
            loop_var: cert
