---
- name: Test issuing certificate with certmonger provider
  hosts: all
  vars:
    certificate_requests:
      - name: mycert_provider
        dns: www.example.com
        ca: self-sign
        provider: certmonger
  tasks:
    - name: Run the role
      include_tasks: tasks/run_role_with_clear_facts.yml

- name: Verify certificate
  hosts: all
  pre_tasks:
    - name: Load certificate role platform variables
      include_role:
        name: linux-system-roles.certificate
        tasks_from: set_vars.yml
        public: true
  vars:
    certificates:
      - path: "{{ __certificate_default_directory }}/certs/mycert_provider.crt"
        key_path: "{{ __certificate_default_directory }}/private/mycert_provider.key"
        subject:
          - name: commonName
            oid: 2.5.4.3
            value: www.example.com
        subject_alt_name:
          - name: DNS
            value: www.example.com
  tasks:
    - name: Verify each certificate
      include_tasks: tasks/assert_certificate_parameters.yml
      loop: "{{ certificates }}"
      loop_control:
        loop_var: cert
